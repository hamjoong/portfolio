spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=ORDER;DATABASE_TO_UPPER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        default_schema: PUBLIC
        globally_quoted_identifiers: false
  data:
    redis:
      host: localhost
      port: 6379
  autoconfigure:
    exclude: 
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_ACTUAL_GOOGLE_CLIENT_ID.apps.googleusercontent.com
            client-secret: YOUR_ACTUAL_GOOGLE_CLIENT_SECRET
            scope: profile, email
          kakao:
            client-id: YOUR_ACTUAL_KAKAO_CLIENT_ID
            client-secret: YOUR_ACTUAL_KAKAO_CLIENT_SECRET
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: test_secret_key_for_shopping_mall_project_2026
  access-token-expiration: 3600000

aws:
  kms:
    key-id: test-key
    region: ap-northeast-2
  s3:
    bucket: test-bucket
    region: ap-northeast-2
