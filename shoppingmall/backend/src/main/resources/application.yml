server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024 # 1KB 이상의 응답만 압축

spring:
  application:
    name: auth-service
  
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: jdbc:postgresql://db.gfgkhqohumjzooslpwsq.supabase.co:5432/postgres
    username: postgres
    password: "!hjuk11535308"
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope: profile, email
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# Internal API Configuration
internal:
  api-key: ${INTERNAL_API_KEY:internal-secret-key-12345}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET_KEY:any-long-secret-key-1234567890}
  access-token-expiration: 3600000 # 1 hour in ms
  refresh-token-expiration: 1209600000 # 14 days in ms

# AWS KMS Configuration
aws:
  kms:
    key-id: ${AWS_KMS_KEY_ID:dummy}
    region: ap-northeast-2
