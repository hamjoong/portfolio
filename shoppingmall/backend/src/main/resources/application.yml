server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024 # 1KB 이상의 응답만 압축

spring:
  application:
    name: auth-service
  
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    # 환경 변수가 있으면 사용하고, 없으면 로컬 H2 파일 DB 사용
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/shoppingdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=ORDER}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        # 환경 변수로 Dialect 주입 가능하게 변경 (기본값은 H2)
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope: profile, email
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# Internal API Configuration
internal:
  api-key: ${INTERNAL_API_KEY:internal-secret-key-12345}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET_KEY:v-this-is-a-sample-secret-key-for-shopping-mall-2026-must-be-long}
  access-token-expiration: 3600000 # 1 hour in ms
  refresh-token-expiration: 1209600000 # 14 days in ms

# AWS KMS Configuration
aws:
  kms:
    key-id: ${AWS_KMS_KEY_ID:dummy}
    region: ap-northeast-2
