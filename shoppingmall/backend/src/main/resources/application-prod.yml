spring:
  # Redis 자동 설정을 완전히 끕니다 (Render 무료 티어에는 Redis가 없으므로)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    # Pooler 주소 대신 직접 접속 주소(5432)를 사용해 봅니다. (SSL 필수)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.gfgkhqohumjzooslpwsq.supabase.co:5432/postgres?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

server:
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
