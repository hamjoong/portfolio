spring:
  # Redis를 완전히 차단합니다. (배포 실패의 주범 중 하나)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    # 6543 포트와 Pooler 전용 아이디를 강제로 고정합니다.
    url: jdbc:postgresql://aws-0-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
    username: postgres.gfgkhqohumjzooslpwsq
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # 연결 속도 최적화 (무료 티어용)
    hikari:
      initialization-fail-timeout: 0
      maximum-pool-size: 5
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

# 에러 원인을 더 자세히 보기 위해 로깅 추가
logging:
  level:
    root: INFO
    com.zaxxer.hikari: DEBUG
    org.springframework.web: INFO
