name: Deploy Portfolio Projects to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'blog3/**'
      - 'milktycoon/**'
      - '.github/workflows/pages-deploy.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            blog3/package-lock.json
            milktycoon/package-lock.json

      # --- Build Blog3 ---
      - name: Install and Build Blog3
        working-directory: blog3
        run: |
          npm ci
          npm run build

      # --- Build MilkTycoon ---
      - name: Install and Build MilkTycoon
        working-directory: milktycoon
        run: |
          npm ci
          npm run build

      # --- Prepare Deployment Folder ---
      - name: Prepare for Deployment
        run: |
          mkdir -p public-dist/blog3
          mkdir -p public-dist/milktycoon
          cp -R blog3/dist/* public-dist/blog3/
          cp -R milktycoon/dist/* public-dist/milktycoon/
          
          # GitHub Pages에서 assets 폴더 무시 방지
          touch public-dist/.nojekyll
          
          # 배포 확인용 메인 index.html 생성
          cat <<EOF > public-dist/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>My Portfolio Deployment</title>
            <style>
              body { font-family: sans-serif; text-align: center; padding: 50px; }
              a { display: block; margin: 20px; font-size: 20px; color: #007bff; text-decoration: none; }
            </style>
          </head>
          <body>
            <h1>Portfolio Project List</h1>
            <a href="./blog3/">Go to Blog3</a>
            <a href="./milktycoon/">Go to MilkTycoon</a>
          </body>
          </html>
          EOF

      # --- Deploy to GitHub Pages ---
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-dist
          publish_branch: gh-pages
          force_orphan: true
