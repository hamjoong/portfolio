name: Deploy Portfolio Projects to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'blog3/**'
      - 'milktycoon/**'
      - '.github/workflows/pages-deploy.yml'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            blog3/package-lock.json
            milktycoon/package-lock.json

      # --- Build Blog3 ---
      - name: Install and Build Blog3
        run: |
          cd blog3
          npm ci
          npm run build
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"

      # --- Build MilkTycoon ---
      - name: Install and Build MilkTycoon
        run: |
          cd milktycoon
          npm ci
          npm run build

      # --- Prepare Deployment Folder ---
      - name: Prepare for Deployment
        run: |
          mkdir -p public-dist/blog3
          mkdir -p public-dist/milktycoon
          cp -R blog3/dist/* public-dist/blog3/
          cp -R milktycoon/dist/* public-dist/milktycoon/
          # Optional: Add a simple landing page index.html to public-dist/ if needed

      # --- Deploy to GitHub Pages ---
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-dist
          keep_files: true # Keep other projects if they were deployed separately
