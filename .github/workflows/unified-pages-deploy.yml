name: Unified Projects Deployment

on:
  push:
    branches: [ "main" ]
    paths:
      - 'blog3/**'
      - 'milktycoon/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. Blog3 빌드
      - name: Build Blog3
        run: |
          cd blog3
          npm install
          npm run build

      # 2. MilkTycoon 빌드
      - name: Build MilkTycoon
        run: |
          cd milktycoon
          npm install
          npm run build

      # 3. 배포용 폴더 구조 생성 (기존 파일 보존 전략)
      - name: Prepare Deployment Folder
        run: |
          mkdir -p final_deploy/blog3
          mkdir -p final_deploy/milktycoon
          cp -r blog3/dist/* final_deploy/blog3/
          cp -r milktycoon/dist/* final_deploy/milktycoon/

      # 4. 통합 배포 (JamesIves 액션 사용, clean: false로 안전하게 합침)
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: final_deploy
          branch: gh-pages
          clean: false # 중요: gh-pages 브랜치에 있는 다른 파일들을 지우지 않습니다.
          git-config-name: "hamjoong"
          git-config-email: "hamjoong@gmail.com"
