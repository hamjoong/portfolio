name: Shoppingmall Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'portfolio/shoppingmall/frontend/**'
      - 'portfolio/shoppingmall/backend/**'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Frontend to Vercel

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: milktycoon

      - name: Build
        run: npm run build
        working-directory: milktycoon

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./milktycoon/dist
          destination_dir: milktycoon
          force_orphan: true # <--- 이 옵션을 양쪽 워크플로우에 모두 추가