     name: Shoppingmall Deploy
    
     on:
       push:
         branches:
           - main
         paths:
           # 루트가 portfolio 폴더라면, 여기서부터 경로를 시작하세요.
           - 'shoppingmall/frontend/**'
           - 'shoppingmall/backend/**'
       workflow_dispatch:

     jobs:
      changes:
        runs-on: ubuntu-latest
        outputs:
          frontend: ${{ steps.filter.outputs.frontend }}
          backend: ${{ steps.filter.outputs.backend }}
        steps:
          - uses: actions/checkout@v4
          - uses: dorny/paths-filter@v3
            id: filter
            with:
              filters: |
                frontend:
                  - 'shoppingmall/frontend/**'
                backend:
                  - 'shoppingmall/backend/**'

      deploy-frontend:
        needs: changes
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Debug Root Directory
            run: ls -R  # 루트 디렉토리의 모든 파일과 폴더를 출력

          # [디버깅 추가] 정확한 경로 파악을 위한 단계
          - name: List files to find exact path
            run: ls -R portfolio/

          # 1. Node.js 환경 설정 (필수!)
          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
              node-version: '20' # Next.js 15는 Node.js 18.17.0 이상을 권장합니다.

          - name: Install dependencies
            working-directory: portfolio/shoppingmall/frontend
            run: npm install

          - name: Build Next.js
            working-directory: portfolio/shoppingmall/frontend
            run: npm run build
            env:
              NODE_ENV: production
              NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }} # 환경변수가 필요한 경우

              cache: 'npm'
              cache-dependency-path: 'portfolio/shoppingmall/frontend/package-lock.json'

          # 3. Vercel 배포
          - name: Deploy to Vercel
            uses: amondnet/vercel-action@v20
            with:
              vercel-token: ${{ secrets.VERCEL_TOKEN }}
              vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
              vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
              # 경로에 띄어쓰기가 있다면 반드시 따옴표로 감싸거나,
              # 가급적 띄어쓰기가 없는 경로명으로 변경하는 것을 권장합니다.
              github-comment: false

      deploy-backend:
        needs: changes
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
          - name: Deploy Backend to Render
            run: |
              # Render 배포 훅 호출