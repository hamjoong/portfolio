     name: Shoppingmall Deploy
    
     on:
       push:
         branches:
           - main
         paths:
           # 루트가 portfolio 폴더라면, 여기서부터 경로를 시작하세요.
           - 'shoppingmall/frontend/**'
           - 'shoppingmall/backend/**'
       workflow_dispatch:

     jobs:
      changes:
        runs-on: ubuntu-latest
        outputs:
          frontend: ${{ steps.filter.outputs.frontend }}
          backend: ${{ steps.filter.outputs.backend }}
        steps:
          - uses: actions/checkout@v4
          - uses: dorny/paths-filter@v3
            id: filter
            with:
              filters: |
                frontend:
                  - 'shoppingmall/frontend/**'
                backend:
                  - 'shoppingmall/backend/**'

      deploy-frontend:
        needs: changes
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          # 1. Node.js 환경 설정 (필수!)
          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
              node-version: '20' # Next.js 15는 Node.js 18.17.0 이상을 권장합니다.
              cache: 'npm'
              cache-dependency-path: portfolio/shoppingmall/frontend/package-lock.json

          # 2. 의존성 설치
          - name: Install dependencies
            working-directory: portfolio/shoppingmall/frontend
            run: npm install

          # 3. Vercel 배포
          - name: Deploy Frontend to Vercel
            uses: amondnet/vercel-action@v20
            with:
              vercel-token: ${{ secrets.VERCEL_TOKEN }}
              vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
              vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
              # 경로에 띄어쓰기가 있다면 반드시 따옴표로 감싸거나,
              # 가급적 띄어쓰기가 없는 경로명으로 변경하는 것을 권장합니다.
              working-directory: 'portfolio/shoppingmall/frontend'
              github-comment: false

      deploy-backend:
        needs: changes
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
          - name: Deploy Backend to Render
            run: |
              # Render 배포 훅 호출