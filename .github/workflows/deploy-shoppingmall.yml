    name: Shoppingmall Deploy
    
    on:
      push:
        branches:
          - main
        paths:
          # 루트가 portfolio 폴더라면, 여기서부터 경로를 시작하세요.
          - 'shoppingmall/frontend/**'
          - 'shoppingmall/backend/**'
      workflow_dispatch:

    jobs:
      changes:
        runs-on: ubuntu-latest
        outputs:
          frontend: ${{ steps.filter.outputs.frontend }}
          backend: ${{ steps.filter.outputs.backend }}
        steps:
          - uses: actions/checkout@v4
          - uses: dorny/paths-filter@v3
            id: filter
            with:
              filters: |
                frontend:
                  - 'shoppingmall/frontend/**'
                backend:
                  - 'shoppingmall/backend/**'

    deploy-frontend:
      needs: changes
      if: ${{ needs.changes.outputs.frontend == 'true' }}
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
    
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Install dependencies
          working-directory: shoppingmall/frontend
          run: npm install

        # [디버깅] 여기서 왜 실패하는지 정확히 로그를 찍어봅니다.
        - name: Build Next.js
          working-directory: shoppingmall/frontend
          run: npm run build
          env:
            # Vercel 빌드 시 필요한 환경변수가 있다면 여기에 추가해야 합니다.
            # 예: NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
            NODE_ENV: production
  
        - name: Deploy to Vercel
          uses: amondnet/vercel-action@v20
          with:
            vercel-token: ${{ secrets.VERCEL_TOKEN }}
            vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
            vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
            working-directory: shoppingmall/frontend
            github-comment: false