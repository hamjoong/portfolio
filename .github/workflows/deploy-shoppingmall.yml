name: Deploy ShoppingMall

on:
  push:
    branches: [ main ]
    paths:
      - 'shoppingmall/frontend/**'
      - 'shoppingmall/backend/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'shoppingmall/frontend/**'
            backend:
              - 'shoppingmall/backend/**'

  deploy-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 의존성 설치 (선택 사항이지만 권장)
      - name: Install dependencies
        run: npm ci
        working-directory: shoppingmall/frontend

      # 2. Vercel 배포 (성공했던 v20 버전 사용)
      # working-directory 옵션을 제거하여 액션이 자동으로 루트를 찾도록 합니다.
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --debug'
          github-comment: false

  deploy-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
