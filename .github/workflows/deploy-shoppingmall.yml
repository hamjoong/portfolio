name: Shoppingmall Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'portfolio/shoppingmall/frontend/**'
      - 'portfolio/shoppingmall/backend/**'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Frontend to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: portfolio/shoppingmall/frontend
          github-comment: false

  # 2. 백엔드 배포 (Render Webhook 방식)
  deploy-backend:
    runs-on: ubuntu-latest
    # 백엔드 폴더가 수정되었을 때만 실행
    if: contains(github.event.head_commit.modified, 'portfolio/shoppingmall/backend/')
    steps:
      - name: Deploy Backend to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}