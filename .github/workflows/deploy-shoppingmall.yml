     name: Shoppingmall Deploy
    
     on:
       push:
         branches:
           - main
         paths:
           # 루트가 portfolio 폴더라면, 여기서부터 경로를 시작하세요.
           - 'shoppingmall/frontend/**'
           - 'shoppingmall/backend/**'
       workflow_dispatch:

     jobs:
      # 변경사항 감지 작업
      changes:
        runs-on: ubuntu-latest
        outputs:
          frontend: ${{ steps.filter.outputs.frontend }}
          backend: ${{ steps.filter.outputs.backend }}
        steps:
          - uses: actions/checkout@v4
          - uses: dorny/paths-filter@v3
            id: filter
            with:
              filters: |
                frontend:
                  - 'shoppingmall/frontend/**'
                backend:
                  - 'shoppingmall/backend/**'

      # 1. 프론트엔드 배포 (Vercel)
      deploy-frontend:
        needs: changes
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
              node-version: '20'

          - name: Install dependencies
            working-directory: shoppingmall/frontend
            run: npm install

          # [중요] Vercel 액션 대신 CLI로 직접 배포하여 에러 로그를 강제 출력합니다.
          - name: Deploy to Vercel (CLI)
            working-directory: shoppingmall/frontend
            run: |
              npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd .
              npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd .
              npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd .
            env:
              VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
              VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

          # 3. Vercel 배포
          - name: Deploy to Vercel
            uses: amondnet/vercel-action@v20
            with:
              vercel-token: ${{ secrets.VERCEL_TOKEN }}
              vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
              vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
              working-directory: shoppingmall/frontend
              # 경로에 띄어쓰기가 있다면 반드시 따옴표로 감싸거나,
              # 가급적 띄어쓰기가 없는 경로명으로 변경하는 것을 권장합니다.
              vercel-args: '--prod'
              github-comment: false

      # 2. 백엔드 배포 (Render)
      deploy-backend:
        needs: changes
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
          - name: Deploy Backend to Render
            run: |
              # Render 배포 훅 호출