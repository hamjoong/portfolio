name: Shoppingmall CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'shoppingmall/frontend/**'
      - 'shoppingmall/backend/**'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.event.head_commit.modified, 'shoppingmall/frontend/')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Frontend to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: shoppingmall/frontend

  deploy-backend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.event.head_commit.modified, 'shoppingmall/backend/')
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
