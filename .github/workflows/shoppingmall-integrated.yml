name: Shopping Mall Integrated CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'shoppingmall/**' # 쇼핑몰 하위 모든 변경 감지
  workflow_dispatch:

jobs:
  # 1. 백엔드 빌드
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Grant execute permission for mvnw
      run: chmod +x shoppingmall/backend/mvnw
    - name: Build Backend (Skip Tests)
      run: |
        cd shoppingmall/backend
        ./mvnw clean package -DskipTests

  # 2. 배포 트리거 (Vercel & Render)
  deploy:
    needs: backend-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Trigger Render Deployment
      run: |
        echo "Render deployment is automatically triggered by GitHub Push."
        # 만약 자동 배포가 꺼져있다면 아래 주석을 풀고 Hook URL을 Secrets에 등록하세요.
        # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

    - name: Confirm Vercel Deployment
      run: |
        echo "Vercel deployment is automatically triggered by GitHub Push for Frontend."
