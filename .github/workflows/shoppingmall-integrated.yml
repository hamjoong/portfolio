name: Shopping Mall CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Grant execute permission for mvnw
      run: chmod +x shoppingmall/backend/mvnw
    
    # 1. 백엔드 빌드 (테스트 생략)
    - name: Build Backend
      run: |
        cd shoppingmall/backend
        ./mvnw clean package -DskipTests -Dmaven.test.skip=true

    # 2. Render 배포 트리거 (새로 발급받은 Render Deploy Hook URL을 여기에 입력하세요)
    - name: Trigger Render Deployment
      run: |
        echo "Sending deployment signal to Render..."
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    # 3. 배포 확인 로그
    - name: Confirm Status
      run: |
        echo "CI/CD process completed. Vercel and Render are updating automatically."
