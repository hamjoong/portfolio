name: Shopping Mall CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 모든 과정을 하나의 작업(Job)으로 묶어 깃허브 목록에는 한 줄만 나오게 합니다.
  build-and-confirm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Grant execute permission for mvnw
      run: chmod +x shoppingmall/backend/mvnw
    
    # 백엔드 빌드 (테스트 생략)
    - name: Build Backend
      run: |
        cd shoppingmall/backend
        ./mvnw clean package -DskipTests -Dmaven.test.skip=true

    # 배포 확인 (로그로만 남김)
    - name: Confirm Deployment Status
      run: |
        echo "Backend build successful. Render and Vercel will deploy automatically."
