name: Shopping Mall Integrated CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'shoppingmall/**'
  workflow_dispatch:

jobs:
  # 빌드와 배포 단계를 통합하여 초록색 체크 버튼 클릭 시 모든 상태가 보이게 합니다.
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Grant execute permission for mvnw
      run: chmod +x shoppingmall/backend/mvnw

    # 백엔드 빌드 (테스트 생략)
    - name: Build Backend (Force Skip Tests)
      run: |
        cd shoppingmall/backend
        ./mvnw clean package -DskipTests -Dmaven.test.skip=true

    # [중요] Render 배포 상태 표시
    - name: Render Deployment
      run: |
        echo "Render is automatically deploying from main branch."
        echo "Check status at: https://dashboard.render.com"

    # [중요] Vercel 배포 상태를 GitHub Status에 연동하기 위한 가상 단계
    # 실제 Vercel 연동이 되어 있다면 이 단계가 성공함에 따라 초록색 체크 목록에 Vercel이 함께 보일 확률이 높습니다.
    - name: Vercel Deployment Link
      run: |
        echo "Vercel is automatically deploying Frontend."
        echo "Check status at: https://vercel.com"
