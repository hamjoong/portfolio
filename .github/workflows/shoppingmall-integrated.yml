name: Shopping Mall Integrated CI/CD

on:
  push:
    branches: [ "main" ]
    # 경로 제한을 풀어서 어떤 수정이든 체크 목록이 나타나게 합니다.
  workflow_dispatch:

jobs:
  # 1. 백엔드 빌드 작업
  backend-build:
    name: 🏗️ Backend Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Grant execute permission for mvnw
      run: chmod +x shoppingmall/backend/mvnw
    - name: Build JAR (Skip Tests)
      run: |
        cd shoppingmall/backend
        ./mvnw clean package -DskipTests -Dmaven.test.skip=true

  # 2. Render 배포 상태 작업 (목록에 별도로 표시됨)
  render-deploy:
    name: 🚀 Render Deployment
    needs: backend-build
    runs-on: ubuntu-latest
    steps:
    - name: Status Check
      run: echo "Render is deploying the latest backend build automatically."

  # 3. Vercel 배포 상태 작업 (목록에 별도로 표시됨)
  vercel-deploy:
    name: ⚡ Vercel Deployment
    needs: backend-build
    runs-on: ubuntu-latest
    steps:
    - name: Status Check
      run: echo "Vercel is deploying the latest frontend build automatically."
