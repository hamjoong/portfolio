name: Deploy DevCodeHub

on:
  push:
    branches: [ main ]
    paths:
      - 'devcodehub/**'
      - '.github/workflows/deploy-devcodehub.yml'

jobs:
  # 1. 변경된 경로를 감지하는 작업
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'devcodehub/backend/**'
            frontend:
              - 'devcodehub/frontend/**'

  # 2. 백엔드 배포 (backend 폴더 수정 시에만 실행)
  backend-deploy:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean package -DskipTests -f devcodehub/backend/pom.xml
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          docker build -t devcodehub-backend devcodehub/backend/
          docker tag devcodehub-backend:latest ${{ steps.login-ecr.outputs.registry }}/devcodehub-backend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/devcodehub-backend:latest

      - name: Render Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: devcodehub/infra/task-definition.json
          container-name: devcodehub-backend
          image: ${{ steps.login-ecr.outputs.registry }}/devcodehub-backend:latest

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: devcodehub-backend-service
          cluster: devcodehub-cluster
          wait-for-service-stability: true

  # 3. 프론트엔드 배포 (frontend 폴더 수정 시에만 실행)
  frontend-deploy:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build React App
        run: |
          cd devcodehub/frontend
          npm install
          npm run build
        env:
          VITE_API_SERVER_URL: ${{ secrets.VITE_API_SERVER_URL }}
          VITE_OAUTH_BASE_URL: ${{ secrets.VITE_OAUTH_BASE_URL }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
      - name: Deploy to S3
        run: aws s3 sync devcodehub/frontend/dist/ s3://devcodehub-frontend-bucket/ --delete
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_ID }} --paths "/*"
