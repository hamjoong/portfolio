name: Deploy DevCodeHub

on:
  push:
    branches: [ main ]

jobs:
  backend-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean package -DskipTests -f devcodehub/backend/pom.xml
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          docker build -t devcodehub-backend devcodehub/backend/
          docker tag devcodehub-backend:latest ${{ steps.login-ecr.outputs.registry }}/devcodehub-backend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/devcodehub-backend:latest

      - name: Deploy to Amazon ECS
        run: aws ecs update-service --cluster devcodehub-cluster --service devcodehub-backend-service --force-new-deployment

  frontend-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build React App
        run: |
          cd devcodehub/frontend
          npm install
          npm run build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
      - name: Deploy to S3
        run: aws s3 sync devcodehub/frontend/dist/ s3://devcodehub-frontend-storage/ --delete
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_ID }} --paths "/*"
