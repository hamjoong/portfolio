name: Deploy Blog3 to GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - 'blog3/**'  # blog3 폴더 내의 파일이 변경될 때만 실행됩니다!
  workflow_dispatch:

permissions:
  contents: write # 깃허브 페이지 배포를 위해 쓰기 권한이 필수입니다.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blog3/package-lock.json

      - name: Install and Build
        run: |
          cd blog3
          npm install
          npm run build

      - name: Deploy with Force Push
        run: |
          # 1. 임시 배포 폴더 설정
          mkdir -p deploy/blog3
          cp -r blog3/dist/* deploy/blog3/
          
          # 2. Git 설정 및 gh-pages 브랜치 체크아웃
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 3. gh-pages 브랜치의 특정 폴더만 강제 업데이트
          # (새로운 저장소를 만들어 gh-pages 브랜치로 강제 푸시하는 정석적인 방법)
          cd deploy
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git checkout -b gh-pages
          git add .
          git commit -m "deploy: force update blog3 content"
          git push -f origin gh-pages
