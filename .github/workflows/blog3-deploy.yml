name: Deploy Blog3 to GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - 'blog3/**'  # blog3 폴더 내의 파일이 변경될 때만 실행됩니다!
  workflow_dispatch:

permissions:
  contents: write # 깃허브 페이지 배포를 위해 쓰기 권한이 필수입니다.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blog3/package-lock.json

      - name: Install and Build
        run: |
          cd blog3
          npm install
          npm run build
          # 빌드 결과물이 잘 생성되었는지 확인 (디버깅용)
          ls -R dist

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: blog3/dist
          target-folder: blog3
          branch: gh-pages
          clean: false # 다른 폴더(milktycoon 등)를 지우지 않기 위해 false로 설정
          single-commit: true # 히스토리를 쌓지 않고 매번 최신으로 덮어씁니다.
          git-config-name: "hamjoong"
          git-config-email: "hamjoong@gmail.com"
