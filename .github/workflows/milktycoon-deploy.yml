name: Deploy MilkTycoon to GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - 'milktycoon/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: milktycoon/package-lock.json

      - name: Install and Build
        run: |
          cd milktycoon
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: milktycoon/dist
          target-folder: milktycoon
          branch: gh-pages
          clean: true
