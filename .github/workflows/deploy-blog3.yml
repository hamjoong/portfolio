name: Deploy Blog3 to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'blog3/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: blog3

      - name: Build
        run: npm run build
        working-directory: blog3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./blog3/dist
          destination_dir: blog3
          force_orphan: true # <--- 이 옵션을 양쪽 워크플로우에 모두 추가
