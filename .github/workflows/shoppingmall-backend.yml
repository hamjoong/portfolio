name: Shopping Mall Backend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'shoppingmall/backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'shoppingmall/backend/**'
  workflow_dispatch: # 수동 실행 버튼을 활성화합니다.

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Redis가 필요한 기능을 위해 가벼운 Redis 컨테이너 실행
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Grant execute permission for mvnw
      run: chmod +x shoppingmall/backend/mvnw

    - name: Build with Maven (Skip Tests)
      run: |
        cd shoppingmall/backend
        ./mvnw clean package -DskipTests
      env:
        SPRING_PROFILES_ACTIVE: test

    # 테스트 통과 후 빌드 (JAR 생성) - 위 단계와 통합되었으므로 중복 제거 가능하지만 안전을 위해 주석 처리하거나 유지
    - name: Build JAR (Already Built)
      run: echo "JAR already built in previous step"

    # Render 배포를 트리거합니다. 
    # [참고] Render의 'Deploy Hook' URL을 사용하면 CI 성공 시 자동으로 배포가 시작됩니다.
    - name: Deploy to Render
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "Triggering Render deployment..."
        # RENDER_DEPLOY_HOOK_URL이 등록되어 있다면 호출합니다.
        # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Deploy hook URL not set"

