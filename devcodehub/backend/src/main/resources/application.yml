# Spring Boot 애플리케이션의 공통 설정을 정의하는 파일입니다.
spring:
  profiles:
    # 기본값으로 Local 프로파일을 활성화합니다. (환경 변수로 다른 프로파일을 지정할 수 있습니다)
    active: local
  application:
    name: devcodehub

  # 데이터베이스 설정 (공통)
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # OAuth 2.0 설정 (공통)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "${GOOGLE_REDIRECT_URI}"
            client-authentication-method: client_secret_post
            scope: profile, email
            client-name: Google
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "${GITHUB_REDIRECT_URI}"
            client-authentication-method: client_secret_post
            scope: user:email, read:user, repo
            client-name: GitHub
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "${KAKAO_REDIRECT_URI}"
            client-authentication-method: client_secret_post
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "${NAVER_REDIRECT_URI}"
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  # 파일 업로드 설정 (공통)
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

# 서버 설정 (공통)
server:
  port: 8080

# CORS 설정
CORS_ALLOWED_ORIGIN: ${FRONTEND_URL:http://localhost:5173}

# AI, PortOne, Upload, Redis 설정 (공통)
app:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      api-url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
      model: gpt-4o-mini
    claude:
      api-key: ${CLAUDE_API_KEY:}
      api-url: ${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
      model: claude-3-5-sonnet-20240620
    gemini:
      api-key: ${GEMINI_API_KEY:}
      api-url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
      model: ${GEMINI_MODEL:gemini-flash-latest}
  
  # 파일 업로드 설정
  upload:
    base-url: ${APP_UPLOAD_BASE_URL:http://localhost:8080}
    profile-dir: uploads/profiles/

  # Redis 설정
  redis:
    auto-startup: ${REDIS_AUTO_STARTUP:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

  # PortOne 설정
  portone:
    v1:
      api-key: ${PORTONE_V1_API_KEY:}
      api-secret: ${PORTONE_V1_API_SECRET:}
      api-url: ${PORTONE_V1_API_URL:https://api.iamport.kr}
    v2:
      store-id: ${PORTONE_V2_STORE_ID:}
      api-secret: ${PORTONE_V2_API_SECRET:}
      api-url: ${PORTONE_V2_API_URL:https://api.portone.io}

# AWS S3 설정 (공통)
cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:devcodehub-uploads-bucket}
    region:
      static: ${AWS_REGION:ap-northeast-2}
    stack:
      auto: false

# JWT 설정 (공통)
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}