spring:
  profiles:
    active: local
  application:
    name: devcodehub

  # OAuth 2.0 설정 (공통)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email, read:user, repo
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/naver"
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

---
# Local Profile (PostgreSQL)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 20000
      pool-name: DevCodeHub-LocalPool
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: true

---
# Production Profile (Supabase PostgreSQL)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# 공통 설정
server:
  port: 8080
  forward-headers-strategy: framework

# 모니터링 설정 (부하 테스트용)
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

# 애플리케이션 커스텀 설정
app:
  # 프론트엔드 주소 (OAuth2 리다이렉션 등에 사용)
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  
  # AI API 설정
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o-mini
    claude:
      api-key: ${CLAUDE_API_KEY:}
      model: claude-3-5-sonnet-20240620
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-flash-latest}
  
  # 파일 업로드 설정
  upload:
    base-url: ${APP_UPLOAD_BASE_URL:http://localhost:8080}
    profile-dir: uploads/profiles/

  # Redis 설정
  redis:
    auto-startup: false

  # Portone 설정
  portone:
    v1:
      api-key: ${PORTONE_V1_API_KEY:}
      api-secret: ${PORTONE_V1_API_SECRET:}
    v2:
      store-id: ${PORTONE_V2_STORE_ID:}
      api-secret: ${PORTONE_V2_API_SECRET:}

# 보안 및 기타 시스템 설정
CORS_ALLOWED_ORIGIN: ${FRONTEND_URL:http://localhost:5173}

# AWS S3 설정
cloud:
  aws:
    s3:
      bucket: devcodehub-assets-842091916432
    region:
      static: ap-northeast-2
    stack:
      auto: false

# JWT 관련 설정
jwt:
  secret: ${JWT_SECRET:} # Base64 encoded secret
  expiration: 3600000 # 1 hour

# 파일 업로드 용량 제한 (20MB)
spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
