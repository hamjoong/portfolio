services:
  postgres:
    image: postgres:16-alpine
    container_name: devcodehub-postgres
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: devcodehub
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devcodehub-redis
    ports:
      - "6379:6379"
