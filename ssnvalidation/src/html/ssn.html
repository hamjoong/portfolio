<!DOCTYPE html>
<html lang='KO'>
<head>
  <meta charset='UTF-8'>
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com'>
  <link href='https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Nanum+Myeongjo&display=swap' rel='stylesheet'>

  <script src='https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js '></script>

  <link rel='favicon icon' href='../../public/favicon/favicon.ico' type='imag/x-icon'>

  <link rel='stylesheet' href='//cdn.jsdelivr.net/npm/xeicon@2.3.3/xeicon.min.css'>
  
  <link rel='stylesheet' href='../../build/css/ssn.css'>

  <title> 주민등록번호 유효성검사 </title>
</head>
<body>
  <!--주민등록번호 메인 박스 영역-->
  <section class="ssn_box">

    <!--주민등록번호 유효성 검사 박스 영역-->
    <section class="ssn_number_validation">주민등록번호 유효성 검사

      <!--주민등록번호 박스 영역-->
      <section class="ssn_number">주민등록번호를 입력해 주세요.</section>

      <!--주민등록번호 입력 영역-->
      <section class="ssncheck_box">
        <form id="ssnCheck" onsubmit="return false;">
          <input type="text" class="ssnInput" name="ssnNumber" id="ssnNumber" value="" maxlength="6" inputmode="numeric" placeholder="앞 6자리">
          <input type="password" class="ssnInput" name="ssnNumber2" id="ssnNumber2" value="" maxlength="7" inputmode="numeric" placeholder="뒤 7자리">
          
          <!--주민등록번호 검사 영역-->
          <div class="button_group">
            <input type="button" id="ssnValidation" class="ssnValidation" value="검사">
            <input type="reset" class="ssnValidation" value="Reset">
          </div>
        </form>
      </section>
    </section>
  </section>
  
  <!--footer 푸터영역-->
  <footer>
    <p class="footer_font">Copyright(C) 2022. Hjuk. All right reserved. 본 사이트는 비상업적인 용도로 제작된 포트폴리오 사이트입니다</p>
  </footer>
  <script src='../../build/script/ssn.js'></script>
</body>
</html>
